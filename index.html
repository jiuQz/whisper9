<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPhone AI Chat</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="phone-container">
        <div class="phone-body">
            <!-- ===== 顶部 ===== -->
            <div class="notch">
                <div class="notch-speaker"></div>
                <div class="notch-camera"></div>
            </div>
            <div class="status-bar">
                <span class="status-time">09:41</span>
                <div class="status-right">
                    <svg class="status-icon" viewBox="0 0 24 16" width="17" height="12">
                        <rect x="0" y="10" width="4" height="6" rx="1" fill="currentColor"/>
                        <rect x="5" y="7" width="4" height="9" rx="1" fill="currentColor"/>
                        <rect x="10" y="4" width="4" height="12" rx="1" fill="currentColor"/>
                        <rect x="15" y="1" width="4" height="15" rx="1" fill="currentColor" opacity="0.35"/>
                    </svg>
                    <svg class="status-icon" viewBox="0 0 27 16" width="27" height="16">
                        <rect x="0" y="1" width="22" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/>
                        <rect x="2" y="3" width="18" height="10" rx="1" fill="currentColor"/>
                        <path d="M23 5v6a2 2 0 000-6z" fill="currentColor"/>
                    </svg>
                </div>
            </div>

            <!-- ===== 页面容器 ===== -->
            <div class="page-container" id="pageContainer">

                <!-- ===== HOME SCREEN 主界面 ===== -->

                    <div class="home-wallpaper">
                        <div class="wallpaper-bg" id="wallpaperBg">
                            <div class="wallpaper-gradient"></div>
                        </div>
                        <div class="home-clock">
                            <div class="home-time" id="homeTime">09:41</div>
                            <div class="home-date" id="homeDate">2026年5月13日 星期二</div>
                        </div>
                        <div class="home-apps">
                            <div class="app-icon" data-app="chat" id="appChat">
                                <div class="app-icon-bg">
                                    <svg viewBox="0 0 40 40" width="28" height="28">
                                        <circle cx="20" cy="20" r="15" fill="rgba(255,255,255,0.2)"/>
                                        <text x="20" y="25" text-anchor="middle" fill="white" font-size="16" font-weight="bold" font-family="Arial">AI</text>
                                    </svg>
                                </div>
                                <span class="app-icon-name">Uchat</span>
                            </div>
                            <div class="app-icon" data-app="settings">

                                    </svg>
                                </div>
                                <span class="app-icon-name">设置</span>
                            </div>
                            <div class="app-icon" data-app="photos">
                                <div class="app-icon-bg">
                                    <svg viewBox="0 0 24 24" width="24" height="24" fill="white">

                                    </svg>
                                </div>
                                <span class="app-icon-name">天气</span>
                            </div>
                            <div class="app-icon" data-app="notes">
                                <div class="app-icon-bg">
                                    <svg viewBox="0 0 24 24" width="24" height="24" fill="white">
                                        <path d="M3 18h12v-2H3v2zM3 6v2h18V6H3zm0 7h18v-2H3v2z"/>
                                    </svg>
                                </div>
                                <span class="app-icon-name">备忘录</span>
                            </div>
                            <div class="app-icon" data-app="clock">
                                <div class="app-icon-bg">
                                    <svg viewBox="0 0 24 24" width="24" height="24" fill="white">

                                    </svg>
                                </div>
                                <span class="app-icon-name">时钟</span>
                            </div>
                            <div class="app-icon" data-app="mask">
                                <div class="app-icon-bg">
                                    <svg viewBox="0 0 40 24" width="30" height="20">
                                        <path d="M2,12 C2,5 9,1 16,2 C19,2.5 21,5 22,7 C23,5 25,2.5 28,2 C35,1 42,5 42,12 C42,16 38,21 32,21 C27,21 25,17 23,14 C22.4,13.4 21.6,13.4 21,14 C19,17 17,21 12,21 C6,21 2,16 2,12 Z" fill="white" stroke="white" stroke-width="0.4" transform="translate(-2,0)"/>

                                        <ellipse cx="29" cy="12" rx="4" ry="2.5" fill="#1a1a2e"/>
                                    </svg>
                                </div>
                                <span class="app-icon-name">假面</span>
                            </div>
                        </div>
                        <!-- Dock 栏 -->
                        <div class="home-dock">
                            <div class="app-icon" data-app="chat">
                                <div class="app-icon-bg">
                                    <svg viewBox="0 0 40 40" width="28" height="28">
                                        <circle cx="20" cy="20" r="15" fill="rgba(255,255,255,0.2)"/>
                                        <text x="20" y="25" text-anchor="middle" fill="white" font-size="16" font-weight="bold" font-family="Arial">AI</text>
                                    </svg>
                                </div>
                                <span class="app-icon-name">Uchat</span>
                            </div>
                            <div class="app-icon" data-app="settings">
                                <div class="app-icon-bg">
                                    <svg viewBox="0 0 24 24" width="24" height="24" fill="white"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.488.488 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1115.6 12 3.611 3.611 0 0112 15.6z"/></svg>
                                </div>
                                <span class="app-icon-name">设置</span>
                            </div>
                            <div class="app-icon" data-app="safari">
                                <div class="app-icon-bg">
                                    <svg viewBox="0 0 24 24" width="24" height="24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
                                </div>
                                <span class="app-icon-name">Safari</span>
                            </div>
                            <div class="app-icon" data-app="music">
                                <div class="app-icon-bg">
                                    <svg viewBox="0 0 24 24" width="24" height="24" fill="white"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55C7.79 13 6 14.79 6 17s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
                                </div>
                                <span class="app-icon-name">音乐</span>
                            </div>
                        </div>
                        <!-- 页面指示点 -->
                        <div class="home-dots">
                            <span class="dot active"></span>
                            <span class="dot"></span>
                        </div>
                    </div>
                </div>

                </div><!-- /page-container -->

            <div class="home-indicator"></div>
        </div><!-- /phone-body -->
    </div>
    <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- App Registry and Loader -->
    <script src="app/uchat.js"></script>
    <script src="app/settings.js"></script>
    <script src="app/chatSettings.js"></script>
    <script src="app/theme.js"></script>
    <script src="app/photos.js"></script>
    <script src="app/music.js"></script>
    <script src="app/safari.js"></script>
    <script src="app/weather.js"></script>
    <script src="app/notes.js"></script>
    <script src="app/clock.js"></script>
    <script src="app/mask.js"></script>
    <script>
        if (window.AppRegistry) {
            const container = document.getElementById('pageContainer');
            window.AppRegistry.forEach(app => {
                if (app.html) {
                    container.insertAdjacentHTML('beforeend', app.html);
                }
            });
        }
    </script>

    <script src="script.js"></script>

    <script>
        if (window.AppRegistry) {
            window.AppRegistry.forEach(app => {
                if (app.init) app.init();
            });
        }
    </script>
</body>
</html>
